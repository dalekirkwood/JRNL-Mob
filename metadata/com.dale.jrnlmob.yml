AutoName: JRNL-Mob
Summary: Minimalist journal with WebDAV sync
Description: |
  A minimalist journaling app for Android that syncs via WebDAV.

  * Write entries with mood, weather, and location
  * Human-readable plain-text .jrnl file format
  * Sync across devices via WebDAV (Nextcloud, ownCloud, etc.)
  * Offline-first — all data stored locally first
  * Tag entries with @tag syntax
  * Automatic weather via Open-Meteo (no API key needed)
  * Material 3 design with Jetpack Compose
  * Zero proprietary dependencies

